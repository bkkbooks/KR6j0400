body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯一曰𤚥用孔雀座印如上二曰體哩呬淫四合如上次三字真言嚩引計吽次五字真言有五種一曰阿囉跛左曩二曰唵嚩日囉二合底丁以反乞叉拏三合一字呼三曰唵耨佉泚去娜四曰唵竭􅖱誐仡囉二合缺平五曰唵竭􅖱誐薩怛嚩二合六字瑜伽真言有六種唵嚩引計曳二合乃娜莫唵嚩引計曳二合引􅚿囉體二合引惹野唵嚩引計曳二合引勢引曬􅁥娑嚩二合唵嚩引計曳二合引騫去惹野唵嚩引計曳二合引𩕳瑟薑二合引野唵嚩引計曳二合引麼曩娑次加持灌頂瓶真言曰娜謨悉底哩野四合地尾二合迦引南引怛他去引誐跢引南引紇哩二合引薩􅞣嚩母馱引曩鼻邏引比野二合囉濕弭也二合鼻曬引罽引囉鼻詵去麼鼻引弩禰引麼賀引麼莫可反攞嚩底味引囉引左隸􅁥娑嚩二合引賀引菩提莊嚴成就真言曰唵嚕止囉麼鼻抳鉢囉二合襪多野吽引大聖曼殊室利菩薩讚歎曰曼祖室哩二合曳曩麼窣覩二合毗焰二合矩引麼囉迦引囉馱引哩抳二合薩普二合哩多枳娘二合曩儞跛引野三怛賴二合路枳野二合馱挽二合多賀哩抳四嚩日囉二合底引乞史拏二合麼賀引野曩五嚩日囉二合句引捨麼賀引庾馱六曼祖室利二合引嚩日囉二合儼鼻引􅝩里野二合七嚩日囉二合沒第曩謨引窣覩二合帝
